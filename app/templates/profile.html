{% extends "base.html" %}

{% block content %}
<div class="auth-card" style="max-width: 550px; text-align: center; margin: 4rem auto;">
    <!-- Minimalist Avatar (Gravatar Glow Efekti ile) -->
    <div style="position: relative; display: inline-block; margin-bottom: 1.5rem;">
        <img src="{{ current_user.avatar_url(120) }}" alt="Avatar" style="border-radius: 50%; border: 3px solid var(--primary-color); box-shadow: 0 0 20px rgba(99, 102, 241, 0.35); display: block; margin: 0 auto; transition: transform 0.3s ease;">
    </div>
    
    <!-- Kullanıcı Bilgileri -->
    <h2 class="card-title" style="margin-bottom: 0.25rem; font-size: 1.8rem; color: #fff;">@{{ current_user.username }}</h2>
    <p class="card-subtitle" style="margin-bottom: 2rem; font-size: 1rem; color: var(--text-secondary);">{{ current_user.email }}</p>
    
    <!-- İstatistik Kartları -->
    <div style="border-top: 1px solid var(--border-color); padding-top: 1.5rem; margin-top: 1.5rem; text-align: left;">
        <h4 style="font-size: 1.1rem; font-weight: 600; color: #fff; margin-bottom: 1rem;">Görev İstatistikleri</h4>
        
        <div style="display: flex; justify-content: space-between; margin-bottom: 1.5rem; gap: 1rem;">
            <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.2rem; flex: 1; text-align: center; backdrop-filter: blur(2px);">
                <div style="font-size: 1.8rem; font-weight: 700; color: #fff; line-height: 1.2;">{{ total_count }}</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.4rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Toplam Görev</div>
            </div>
            
            <div style="background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-color); border-radius: 12px; padding: 1.2rem; flex: 1; text-align: center; backdrop-filter: blur(2px);">
                <div style="font-size: 1.8rem; font-weight: 700; color: var(--status-completed); line-height: 1.2;">{{ completed_count }}</div>
                <div style="font-size: 0.8rem; color: var(--text-secondary); margin-top: 0.4rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px;">Tamamlanan</div>
            </div>
        </div>
        
        <!-- Başarı Oranı & Progress Bar (Sıfıra Bölünme Hatalarına Karşı Korumalı) -->
        <div style="margin-bottom: 0.6rem; display: flex; justify-content: space-between; font-size: 0.95rem;">
            <span style="color: var(--text-secondary); font-weight: 500;">Başarı Oranı</span>
            <span style="color: var(--status-completed); font-weight: 600;">%{{ success_percentage }}</span>
        </div>
        
        <!-- Minimalist İlerleme Çubuğu -->
        <div style="background: rgba(255, 255, 255, 0.08); border-radius: 10px; height: 10px; width: 100%; overflow: hidden; margin-bottom: 2.5rem;">
            <div style="background: linear-gradient(90deg, var(--primary-color) 0%, var(--status-completed) 100%); height: 100%; width: {{ success_percentage }}%; border-radius: 10px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1);"></div>
        </div>
    </div>
    
    <div style="display: flex; gap: 1rem; justify-content: center;">
        <a href="{{ url_for('main.index') }}" class="btn-block btn-secondary" style="text-align: center; text-decoration: none; padding-top: 0.75rem; margin-top: 1rem; width: 100%; max-width: 250px;">Görevlerime Dön</a>
    </div>
</div>
{% endblock %}
